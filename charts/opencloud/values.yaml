# OpenCloud Helm Chart Values
# This is a YAML-formatted file with configuration values for the OpenCloud Helm chart.
# The file is organized into logical sections for different components of the system.

# =====================================================================
# SECURITY WARNING
# =====================================================================
# IMPORTANT: The following default credentials MUST be changed in production environments.
# Using these default values in production is a significant security risk.
#
# Credentials that need to be changed:
# 1. Keycloak Admin: adminUser: admin, adminPassword: admin
# 2. OpenCloud Admin: adminPassword: admin
# 3. PostgreSQL: user: keycloak, password: keycloak
# 4. MinIO: rootUser: opencloud, rootPassword: opencloud-secret-key


# =====================================================================
# GLOBAL SETTINGS
# =====================================================================

# Global settings that apply across components
global:
  # Domain settings for various services
  domain:
    # Main domain for OpenCloud
    opencloud: cloud.opencloud.test
    # Domain for Keycloak
    oidc: keycloak.opencloud.test
    # Domain for MinIO
    minio: minio.opencloud.test
    # Domain for WOPI server
    wopi: wopiserver.opencloud.test
    # Domain for Collabora CODE
    collabora: collabora.opencloud.test
    # Domain for Companion
    companion: companion.opencloud.test

  # TLS settings for secure connections
  tls:
    # Enable TLS (set to false when using gateway TLS termination externally)
    enabled: false
    # secretName for TLS certificate
    secretName: ""

  # Global storage settings
  storage:
    # Storage class for persistent volumes
    storageClass: ""

  # Global image settings
  image:
    # Global registry override - if set, it will override all image registries
    # Example: my-private-registry.com
    registry: ""
    # Global pull policy override - if set, it will override all image pull policies
    # Options: Always, IfNotPresent, Never
    pullPolicy: ""

# =====================================================================
# UTILITY IMAGES
# =====================================================================

# Busybox image settings (used for init containers)
busybox:
  image:
    # Busybox image registry
    registry: docker.io
    # Busybox image repository
    repository: library/busybox
    # Busybox image tag
    tag: "1.38"
    # Image pull policy
    pullPolicy: IfNotPresent

# =====================================================================
# IDENTITY PROVIDER (OIDC)
# =====================================================================

# OIDC (OpenID Connect) settings for identity and access management
# OpenCloud requires an OIDC provider for authentication.
# Deploy Keycloak separately (e.g., via bitnami/keycloak chart in helmfile)
# and configure the external OIDC settings below.
# Supports any OIDC-compliant provider (Keycloak, Auth0, Okta, Azure AD, etc.)
oidc:
  # OIDC Issuer URL (required)
  # This is the base URL of your OIDC provider's authorization server
  # Examples:
  #   Keycloak: https://keycloak.example.com/realms/openCloud
  #   Auth0: https://your-tenant.auth0.com
  #   Okta: https://your-org.okta.com/oauth2/default
  #   Azure AD: https://login.microsoftonline.com/{tenant-id}/v2.0
  #   Google: https://accounts.google.com
  issuerUrl: ""
  
  # OIDC Client ID (required)
  # The client ID registered in your OIDC provider for OpenCloud
  clientId: "web"
  
  # Account Management URL (optional)
  # URL where users can manage their accounts (profile, password, etc.)
  # If not set, OpenCloud will attempt to construct this from the issuerUrl
  # Examples:
  #   Keycloak: https://keycloak.example.com/realms/openCloud/account
  #   Auth0: https://your-tenant.auth0.com/u/login
  #   Okta: https://your-org.okta.com/enduser/settings
  accountUrl: ""

  # Disable TLS certificate validation for OIDC provider connections
  # WARNING: Should be disabled in production
  oidcIdpInsecure: false

  # OIDC scope for web client
  scope: "openid profile email groups roles"

  # CORS settings for cross-origin requests
  cors:
    # Enable CORS
    enabled: true
    # Allow all origins
    allowAllOrigins: true
    # Allowed origins (used if allowAllOrigins is false)
    origins: []
    # Allowed methods
    methods: "GET,POST,PUT,DELETE,OPTIONS"
    # Allowed headers
    headers: "Origin,Accept,Authorization,Content-Type,Cache-Control"
    # Exposed headers
    exposedHeaders: "Access-Control-Allow-Origin,Access-Control-Allow-Credentials"
    # Allow credentials
    allowCredentials: "true"
    # Max age in seconds
    maxAge: "3600"


# =====================================================================
# EXTENSIONS
# =====================================================================

# Tika settings for full-text search
tika:
  # Enable Tika
  enabled: true
  # Tika image settings
  image:
    # Tika image registry
    registry: docker.io
    # Tika image repository
    repository: apache/tika
    # Tika image tag
    tag: "3.3.1.0-full"
    # Image pull policy
    pullPolicy: IfNotPresent
  # Resources allocation
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 3Gi
  # Probe settings for health checks
  probes:
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1

# Web Extensions settings
webExtensions:
  # Enable web extensions
  enabled: true
  # Common image settings for all extensions
  image:
    # Registry for web extensions
    registry: docker.io
    # Repository for web extensions
    repository: opencloudeu/web-extensions
    # Image pull policy
    pullPolicy: IfNotPresent
  # List of extensions to install
  extensions:
    # Draw.io extension
    drawio:
      enabled: true
      tag: draw-io-2.0.0
    # External Sites extension
    externalsites:
      enabled: true
      tag: external-sites-2.0.0
    # Importer extension
    importer:
      enabled: true
      tag: importer-1.0.0
    # JSON Viewer extension
    jsonviewer:
      enabled: true
      tag: json-viewer-2.0.0
    # Progress Bars extension
    progressbars:
      enabled: true
      tag: progress-bars-2.0.0
    # Unzip extension
    unzip:
      enabled: true
      tag: unzip-2.0.0
    # Arcade extension
    arcade:
      enabled: false
      tag: arcade-2.0.0
    # Calculator extension
    calculator:
      enabled: false
      tag: calculator-2.0.0
    # Cast extension
    cast:
      enabled: false
      tag: cast-1.0.0
    # Maps extension
    maps:
      enabled: false
      tag: maps-3.0.0
    # Pastebin extension
    pastebin:
      enabled: false
      tag: pastebin-2.0.0

# =====================================================================
# COLLABORATION (COLLABORA)
# =====================================================================

collabora:
  enabled: true
  image:
    registry: docker.io
    repository: collabora/code
    pullPolicy: IfNotPresent
    tag: 25.04.10.3.1
  ssl:
    enabled: false
    verification: true

  existingSecret: ""

  admin:
    username: admin

    # ignored if collabora.existingSecret is set
    password: admin

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi

  # External Collabora service configuration
  # Use these settings when Collabora runs outside this chart (can be another k8s service
  # or an external host). Protocol is used for readiness checks (http/https).
  external:
    enabled: false
    # Hostname or IP of the external Collabora endpoint (cluster-local service name or external host)
    host: collabora-collabora-online
    # Port number of the external Collabora endpoint
    port: 9980
    # Protocol to use for readiness checks (http or https)
    protocol: http

# =====================================================================
# Collaboration
# =====================================================================

# Top-level configuration for the standalone collaboration (WOPI) service.
# Note: no 'enabled' flag here — the collaboration service is required when
# collabora or collabora.external are used.
collaboration:
  # Enable Collaboration
  enabled: true
  # Number of replicas (Note: When using multiple replicas, persistence should be disabled
  # or use a storage class that supports ReadWriteMany access mode)
  replicas: 1
  # Resource requests/limits for the collaboration service (WOPI)
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 5000m
      memory: 10Gi

  # Additional environment variables for the collaboration service
  env: []
  
# =====================================================================
# OPENCLOUD CORE
# =====================================================================

# Image settings for OpenCloud
image:
  # OpenCloud image registry
  registry: docker.io
  # OpenCloud image repository
  repository: opencloudeu/opencloud-rolling
  # OpenCloud image tag
  tag: "7.1.0"
  # Image pull policy
  pullPolicy: IfNotPresent
  # Image pull secrets
  pullSecrets: []

# OpenCloud core settings
opencloud:
  # Comma-separated list of available roles for the graph service
  graphAvailableRoles: "b1e2218d-eef8-4d4c-b82d-0f1a1b48f3b5,a8d5fe5e-96e3-418d-825b-534dbdf22b99,fb6c3e19-e378-47e5-b277-9732f9de6e21,58c63c02-1d89-4572-916a-870abc5a1b7d,2d00ce52-1fc2-4dbc-8b95-a73b73395f5a,1c996275-f1c9-4e71-abdf-a42f6495e960,312c0871-5ef7-4b3a-85b6-0e4074c64049,aa97fe03-7980-45ac-9e50-b325749fd7e6"
  # Use TLS between proxy and OpenCloud (default: false)
  proxyTls: false
  # gRPC address for the REVA gateway (default: 0.0.0.0:9142)
  gatewayGrpcAddr: "0.0.0.0:9142"
  # Enable basic auth for proxy (default: false)
  proxyEnableBasicAuth: false
  # Require password for public shares (default: false)
  sharingPublicShareMustHavePassword: false
  # File name for banned password list (default: banned-password-list.txt)
  passwordPolicyBannedPasswordsList: "banned-password-list.txt"
  # Search extractor type (default: tika)
  searchExtractorType: "tika"
  # Search content extraction size limit in bytes (default: empty = uses OpenCloud default)
  # Example: 104857600 for 100MB
  searchExtractorSizeLimit: ""
  # Max gRPC received message size (default: 102400000)
  grpcMaxReceivedMessageSize: "102400000"
  # Autoprovision accounts via proxy (default: true)
  proxyAutoprovisionAccounts: true
  # Readonly user attributes in frontend (default: user.onPremisesSamAccountName,user.displayName,user.mail,user.passwordProfile,user.accountEnabled,user.appRoleAssignments)
  frontendReadonlyUserAttributes: "user.onPremisesSamAccountName,user.displayName,user.mail,user.passwordProfile,user.accountEnabled,user.appRoleAssignments"
  # Check for updates in frontend (default: false)
  frontendCheckForUpdates: false
  # Role assignment driver for proxy (default: oidc)
  proxyRoleAssignmentDriver: "oidc"
  # Rewrite OIDC .well-known endpoint (default: true)
  proxyOidcRewriteWellknown: true
  # OIDC claim for user (default: preferred_username)
  proxyUserOidcClaim: "preferred_username"
  # CS3 claim for user (default: username)
  proxyUserCs3Claim: "username"
  # Admin user id (default: empty string)
  adminUserId: ""
  # Assign default user role in graph (default: false)
  graphAssignDefaultUserRole: false
  # Username match strategy for graph (default: none)
  graphUsernameMatch: "none"
  # OIDC claim for role assignment (default: roles)
  proxyRoleAssignmentOidcClaim: "roles"
  # OIDC access token verify method (default: jwt)
  proxyOidcAccessTokenVerifyMethod: "jwt"
  # LDAP server write enabled (default: true)
  ldapServerWriteEnabled: true
  # LDAP configuration (used when externalUserManagement is enabled)
  ldap:
    uri: "ldaps://openldap.openldap.svc.cluster.local:636"
    insecure: true
    bindDN: "cn=admin,dc=opencloud,dc=eu"
    adminPassword: "admin"  # Must match OpenLDAP adminPassword
    # Name of the secret containing LDAP bind password (key: reva-ldap-bind-password)
    # If not set, defaults to <release-name>-opencloud-ldap
    secretRef: ""
    user:
      baseDN: "ou=users,dc=opencloud,dc=eu"
      schema:
        id: "opencloudUUID"
    group:
      baseDN: "ou=groups,dc=opencloud,dc=eu"
      createBaseDN: "ou=custom,ou=groups,dc=opencloud,dc=eu"
      schema:
        id: "opencloudUUID"
    disableUserMechanism: "attribute"
  # Graph LDAP refint enabled (default: true)
  graphLdapRefintEnabled: true
  # Graph LDAP server UUID (default: false for external IdP)
  graphLdapServerUuid: "false"
  # Settings setup default assignments (default: false)
  settingsSetupDefaultAssignments: "false"
  # Proxy autoprovision claim username (default: sub)
  proxyAutoprovisionClaimUsername: "sub"
  # Frontend full text search enabled (default: true)
  frontendFullTextSearchEnabled: true
  # OIDC scope for web (default: openid profile email groups roles)
  oidc:
    scope: "openid profile email groups roles"
  # CSP config file location (default: /etc/opencloud/csp.yaml)
  cspConfigFileLocation: "/etc/opencloud/csp.yaml"
  # Enable OpenCloud
  enabled: true
  # Number of replicas (Note: When using multiple replicas, persistence should be disabled
  # or use a storage class that supports ReadWriteMany access mode)
  replicas: 1
  # Log level
  logLevel: info
  # Log color
  logColor: false
  # Log pretty
  logPretty: false
  # Insecure mode (for self-signed certificates)
  insecure: true
  
  # Disable TLS certificate validation for OpenCloud HTTP API connections
  # WARNING: Should be disabled in production
  ocHttpApiInsecure: false
  
  # Use existing secret for opencloud admin credentials (Note: secretKeyName must be adminPassword)
  existingSecret: ""
  
  # Admin password
  # ignored if opencloud.existingSecret is set
  adminPassword: admin

  # Init secrets for deterministic service credentials across restarts.
  # Set existingSecret to use a pre-created Secret; otherwise auto-generated.
  initSecrets:
    existingSecret: ""
  
  # Create demo users
  createDemoUsers: false
  # Additional services to start
  additionalServices: []
  # Services to exclude from starting
  excludeServices:
    - "idp"
  env: []
  envFrom: []
  # Resources allocation
  resources:
    requests:
      cpu: 128m
      memory: 128Mi
    limits:
      memory: 20Gi
  # Persistence configuration
  persistence:
    data:
      # Enable persistence
      enabled: true
      # Name of existing PVC to use (overrides all other persistence values)
      existingClaim: ""
      # Size of the persistent volume for data
      size: 30Gi
      # Storage class
      storageClass: ""
      # Access mode (ReadWriteOnce or ReadWriteMany for multiple replicas)
      accessMode: ReadWriteOnce
  # Migration configuration for migrating credentials from legacy config PVC to new secrets
  migration:
    # Enable credential migration job on chart upgrades.
    enabled: false
    # Name of the legacy config PVC to read credentials from.
    # Defaults to "<fullname>-config" if not set.
    configPvcClaimName: ""
  
  # Configuration files
  config:
    theme: "owncloud"
    # App registry configuration
    appRegistry: {}
    # CSP configuration
    csp: {}
    # Proxy configuration
    # ==== Example ====
    # role_quotas: # Sets default Quota's for roles (in bytes)
    #   'd7beeea8-8ff4-406b-8fb6-ab2dd81e6b11': 15000000000 # User
    #   '2aadd357-682c-406b-8874-293091995fdd': 15000000000 # SpaceAdmin
    #   '71881883-1768-46bd-a24d-a356a2afdf7f': 15000000000 # Admin
    # 
    # role_assignment:
    #   driver: oidc
    #   oidc_role_mapper:
    #     role_claim: groups
    #     role_mapping:
    #       - role_name: admin                # OpenCloud Role
    #         claim_value: "authentik Admins" # Authentik Group
    #       - role_name: spaceadmin
    #         claim_value: "opencloud-spaces"
    #       - role_name: user
    #         claim_value: "opencloud"
    proxy: {}
    # Banned password list configuration
    # Format: Multi-line string (not YAML array)
    # Use the |- syntax to preserve line breaks
    # Add one password per line - do not use YAML list syntax (no dashes)
    # Example:
    #   bannedPasswordList: |-
    #     password1
    #     password2
    #     password3
    # For very long lists override the file 'files/opencloud/banned-password-list.txt'
    bannedPasswordList: |-

  # Internal NATS endpoint (default: 127.0.0.1:9233)
  nats:
    internalEndpoint: "127.0.0.1:9233"
    host: "0.0.0.0"
    port: "9233"
    external:
      # -- Use an external NATS messaging system instead of the internal one.
      # Recommended for all production instances.
      # Needs to be used if HighAvailability is needed.
      # Needs to be used if OpenCloud shall be used by more than a 2-digit user count.
      enabled: false

      # -- Endpoint of the messaging system.
      endpoint: nats.opencloud-nats.svc.cluster.local:4222

      # -- Cluster name to use with the messaging system.
      cluster: opencloud-cluster

      tls:
        # -- Enables TLS encrypted communication with the messaging system.
        # Recommended for production installations.
        enabled: false
        
        # -- Set only to false, if the certificate of your messaging system service is not trusted.
        # If set to false, you need to put the CA cert of the messaging system server into the secret referenced by "caSecretName"
        certTrusted: true

        # -- Disables SSL certificate checking for connections to the messaging system server.
        # -- For self signed certificates, consider to put the CA cert of the messaging system secure server into the secret referenced by "caSecretName"
        # Not recommended for production installations.
        insecure: false

        # Use existing CA secret for nats credentials (Note: secretKeyName must be 'ca.crt' with the root CA certificate for NATS)
        # Only used if certTrusted is false
        caSecretName : opencloud-nats-ca

  # =====================================================================
  # EMAIL (SMTP)
  # =====================================================================
  
  # SMTP settings for email notifications
  smtp:
    # Enable SMTP
    enabled: false
    # SMTP host
    host: ""
    # SMTP port
    port: "587"
    # SMTP sender
    sender: ""
    
    # Use existing secret for opencloud smtp credentials (Note: secretKeyName must be smtpUser and smtpPassword)
    existingSecret: ""
    
    # SMTP username
    # ignored if opencloud.smtp.existingSecret is set
    username: ""

    # SMTP password
    # ignored if opencloud.smtp.existingSecret is set
    password: ""

    # SMTP insecure (allow self-signed certificates)
    insecure: "false"
    # SMTP authentication method
    authentication: "plain"
    # SMTP encryption method
    encryption: "starttls"

  # =====================================================================
  # STORAGE CONFIGURATION
  # =====================================================================
  
  # Storage configuration
  storage:
    systemDriver: "decomposed"
    # Storage driver for user files: "decomposeds3" (default), "posix", or "decomposed"
    # If not set, defaults to "decomposeds3" when mode is "s3", or "posix" when mode is "posixfs"
    usersDriver: ""
    # Storage mode for user files, can be "s3" (default) or "posixfs"
    # This is a convenience setting that sets usersDriver if usersDriver is not explicitly set
    mode: s3
    # S3 storage configuration
    s3:
      enabled: true
      # MinIO image settings
      image:
        registry: docker.io
        repository: minio/minio
        tag: latest
        pullPolicy: IfNotPresent
      # httpRoute configuration
      httpRoute:
        enabled: false
      existingSecret: ""
      rootUser: opencloud
      rootPassword: opencloud-secret-key
      bucketName: opencloud-bucket
      region: "default"
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 2Gi
      persistence:
        enabled: true
        existingClaim: ""
        size: 30Gi
        storageClass: ""
        accessMode: ReadWriteOnce
      # External S3 (can be S3, Ceph, or external MinIO)
      external:
        # External S3 endpoint URL (no 'enabled' field anymore)
        endpoint: ""
        region: "default"
        existingSecret: ""
        accessKey: ""
        secretKey: ""
        bucket: ""
        createBucket: true
    # Decomposed filesystem configuration (when usersDriver is "decomposed")
    decomposed:
      # Maximum number of concurrent operations
      maxConcurrency: 100
      # Path of storage root directory, default is /var/lib/opencloud/storage
      rootPath: "/var/lib/opencloud/storage"
      persistence:
        # Enable persistence
        enabled: true
        # Name of existing PVC to use (overrides all other persistence values)
        existingClaim: ""
        # Size of the persistent volume for data
        size: 30Gi
        # Storage class
        storageClass: ""
        # Access mode (ReadWriteOnce or ReadWriteMany for multiple replicas)
        accessMode: ReadWriteOnce
    posixfs:
      # The type of the cache store, supported values are: 'memory', 'redis-sentinel', 'nats-js-kv' (default), 'noop'
      idCacheStore: nats-js-kv
      # Path of storage root directory, default is /var/lib/opencloud/storage
      rootPath: "/var/lib/opencloud/storage"
      persistence:
        # Enable persistence
        enabled: true
        # Name of existing PVC to use (overrides all other persistence values)
        existingClaim: ""
        # Size of the persistent volume for data
        size: 30Gi
        # Storage class
        storageClass: ""
        # Access mode (ReadWriteOnce or ReadWriteMany for multiple replicas)
        accessMode: ReadWriteOnce
  # affinity: {}

  # =====================================================================
  # ANTIVIRUS (ClamAV)
  # =====================================================================
  
  # Antivirus scanning configuration
  # Requires ClamAV to be deployed separately (e.g., via wiremind/clamav chart)
  antivirus:
    # Enable antivirus scanning
    enabled: false
    # What to do with infected files: "abort" (default), "continue", or "delete"
    infectedFileHandling: "abort"
    # Scanner type: "clamav" (default) or "icap"
    scannerType: "clamav"
    # ClamAV socket endpoint (when scannerType is "clamav")
    clamavSocket: "tcp://clamav.clamav.svc.cluster.local:3310"
    # ICAP URL (when scannerType is "icap")
    icapUrl: ""
    # ICAP service name (when scannerType is "icap")
    icapService: "avscan"

  # =====================================================================
  # OPA REGO POLICIES
  # =====================================================================
  
  # OPA Rego policies for file extension and MIME type restrictions
  policies:
    # Enable OPA policies
    enabled: false
    # List of policy files
    policies: []
      # Example:
      # - fileName: proxy.rego
      #   content: |
      #     package proxy
      #     import future.keywords.if
      #     import data.utils
      #     default granted := true
      #     granted = false if {
      #         input.request.method == "PUT"
      #         utils.is_extension_restricted(input.resource.name)
      #     }

# =====================================================================
# GATEWAY-API HTTPRoute
# =====================================================================

# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)
httpRoute:
  # Enable HTTPRoute resources (set to true to create Gateway API routes)
  enabled: false

  # Gateway configuration
  gateway:
    # Create the gateway
    create: false
    # HTTPS Port to listen to (k3s traefik defaults to 8443)
    port: 443
    # Gateway name
    name: opencloud-gateway
    # Gateway class (defaults to "cilium")
    className: cilium
    # Gateway namespace (defaults to Release.Namespace)
    namespace: ""
    # Gateway section name (applies to all routes). If set to a non-empty value, this overrides the default component-specific section names (e.g., opencloud-https) for all routes. If left empty, the defaults are used.
    sectionName: ""
    # Gateway HTTP section name for redirect routes. If set to a non-empty value, this overrides the default component-specific HTTP section names (e.g., opencloud-proxy-http) for redirect routes. If left empty, the defaults are used.
    httpSectionName: ""
    # Gateway annotations
    annotations:
    # Gateway annotations
    infrastructure:
      annotations: {}

# =====================================================================
# INGRESS
# =====================================================================

# Ingress configuration
ingress:
  # Whether to enable ingress resources for components
  enabled: false

  # The ingress class name to use (e.g., nginx, traefik). Leave empty to use the cluster default.
  # Note: This sets the Kubernetes `spec.ingressClassName` field.
  ingressClassName: ""

  # Custom annotations applied to all ingress resources.
  # These are merged with any annotations from 'annotationsPreset' (if set).
  annotations: {}
    # Example:
    # cert-manager.io/cluster-issuer: letsencrypt

# =====================================================================
# MONITORING
# =====================================================================

# Prometheus ServiceMonitor configuration
monitoring:
  # Enable ServiceMonitor for Prometheus scraping
  enabled: false
  # Additional labels for the ServiceMonitor (e.g., for Prometheus selector)
  labels: {}
  # Scrape interval (default: 30s)
  interval: "30s"
  # Scrape timeout (default: 10s)
  scrapeTimeout: "10s"

# =====================================================================
# EXTRA RESOURCES
# =====================================================================

# Arbitrary extra Kubernetes resources to deploy
# Each item should be a valid Kubernetes resource definition
extraResources: []
  # Example:
  # - apiVersion: v1
  #   kind: ConfigMap
  #   metadata:
  #     name: my-config
  #   data:
  #     key: value

# =====================================================================
# CUSTOM CA CHAIN
# =====================================================================

# Custom CA certificate for inter-service TLS
customCA:
  # Enable custom CA certificate
  enabled: false
  # Name of the ConfigMap containing the CA certificate (key: ca.crt)
  configMapName: ""
