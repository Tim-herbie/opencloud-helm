{{- if and .Values.collabora.enabled .Values.collabora.external.enabled }}
{{- fail "Cannot enable both internal and external Collabora. Set either collabora.enabled=true or collabora.external.enabled=true, not both." }}
{{- end }}
{{- if .Values.collabora.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencloud.fullname" . }}-collabora
  labels:
    {{- include "opencloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: collabora
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "opencloud.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: collabora
  template:
    metadata:
      labels:
        {{- include "opencloud.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: collabora
    spec:
      containers:
        - name: collabora
          image: {{ include "opencloud.image" (dict "imageValues" .Values.collabora.image "global" .Values.global) | quote }}
          imagePullPolicy: {{ include "opencloud.image.pullPolicy" (dict "pullPolicy" .Values.collabora.image.pullPolicy "global" .Values.global) }}
          command: ['/bin/bash', '-c']
          args:
            - 'coolconfig generate-proof-key && /start-collabora-online.sh'
          env:
            - name: aliasgroup1
              value: "http://{{ include "opencloud.fullname" . }}-collaboration:9300,https://{{ .Values.global.domain.wopi }}"
            - name: DONT_GEN_SSL_CERT
              value: "YES"
            - name: extra_params
              value: |
                --o:ssl.enable={{ .Values.collabora.ssl.enabled }} \
                --o:ssl.ssl_verification={{ .Values.collabora.ssl.verification }} \
                --o:ssl.termination=true \
                --o:welcome.enable=false \
                --o:update.enable=false \
                --o:net.frame_ancestors={{ include "opencloud.domain" . }} \
                --o:security.capabilities=false \
                --o:child_root_path=/tmp/coolwsd-child-roots \
                --o:cache_files.path=/tmp/coolwsd-cache \
                --o:logging.disable_server_audit=true
            - name: username
              valueFrom:
                secretKeyRef:
                  name: {{- if .Values.collabora.existingSecret }}
                          {{ .Values.collabora.existingSecret }}
                        {{- else }}
                          {{ include "opencloud.fullname" . }}-collabora
                        {{- end }}
                  key: username
            - name: password
              valueFrom:
                secretKeyRef:
                  name: {{- if .Values.collabora.existingSecret }}
                          {{ .Values.collabora.existingSecret }}
                        {{- else }}
                          {{ include "opencloud.fullname" . }}-collabora
                        {{- end }}
                  key: password
          ports:
            - containerPort: 9980
              name: http
              protocol: TCP
          resources:
            {{- toYaml .Values.collabora.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /hosting/discovery
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /hosting/discovery
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: coolwsd-child-roots
              mountPath: /tmp/coolwsd-child-roots
            - name: coolwsd-cache
              mountPath: /tmp/coolwsd-cache
      volumes:
        - name: coolwsd-child-roots
          emptyDir: {}
        - name: coolwsd-cache
          emptyDir: {}
{{- end }}
