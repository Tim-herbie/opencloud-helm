{{- if and .Values.httpRoute.enabled .Values.collabora.enabled }}
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ include "opencloud.fullname" . }}-collabora-http-redirect
  labels:
    {{- include "opencloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: collabora
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.gateway.name }}
      namespace: {{ .Values.httpRoute.gateway.namespace | default .Release.Namespace }}
      {{- with .Values.httpRoute.gateway.sectionName }}
      sectionName: {{ . }}-collabora-http
      {{- end }}
  hostnames:
    - {{ .Values.global.domain.collabora | quote }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: {{ .Values.global.domain.collabora }}
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ include "opencloud.fullname" . }}-collabora-httproute
  labels:
    {{- include "opencloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: collabora
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.gateway.name }}
      namespace: {{ .Values.httpRoute.gateway.namespace | default .Release.Namespace }}
      {{- with .Values.httpRoute.gateway.sectionName }}
      sectionName: {{ . }}-collabora-https
      {{- end }}
  hostnames:
    - {{ .Values.global.domain.collabora | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "opencloud.fullname" . }}-collabora
          port: 9980
{{- end }}
