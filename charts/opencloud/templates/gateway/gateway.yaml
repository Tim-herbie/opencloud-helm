{{- if .Values.httpRoute.gateway.create }}
{{- $prefix := .Values.httpRoute.gateway.sectionName | default (include "opencloud.fullname" .) }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.httpRoute.gateway.name }}
  namespace: {{ .Values.httpRoute.gateway.namespace | default .Release.Namespace }}
  labels:
    {{- include "opencloud.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ .Values.httpRoute.gateway.className }}
  {{- with .Values.httpRoute.gateway.infrastructure }}
  infrastructure:
      {{- toYaml . | nindent 4 }}
  {{- end }}
  listeners:
    # OpenCloud (proxy) - HTTP redirect listener
    - name: {{ $prefix }}-proxy-http
      protocol: HTTP
      port: 80
      hostname: {{ .Values.global.domain.opencloud | quote }}
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.httpRoute.gateway.namespace | default .Release.Namespace }}
    # Keycloak - HTTP redirect listener
    - name: {{ $prefix }}-keycloak-http
      protocol: HTTP
      port: 80
      hostname: {{ .Values.global.domain.oidc | quote }}
      allowedRoutes:
        namespaces:
          from: All
    # WOPI - HTTP redirect listener
    - name: {{ $prefix }}-wopi-http
      protocol: HTTP
      port: 80
      hostname: {{ .Values.global.domain.wopi | quote }}
      allowedRoutes:
        namespaces:
          from: All
    # Collabora - HTTP redirect listener (conditional)
    {{- if .Values.collabora.enabled }}
    - name: {{ $prefix }}-collabora-http
      protocol: HTTP
      port: 80
      hostname: {{ .Values.global.domain.collabora | quote }}
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.httpRoute.gateway.namespace | default .Release.Namespace }}
    {{- end }}
    # MinIO - HTTP redirect listener (conditional, only for internal s3 mode)
    {{- if and (eq .Values.opencloud.storage.mode "s3") .Values.opencloud.storage.s3.enabled .Values.opencloud.storage.s3.httpRoute.enabled }}
    - name: {{ $prefix }}-minio-http
      protocol: HTTP
      port: 80
      hostname: {{ .Values.global.domain.minio | quote }}
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.httpRoute.gateway.namespace | default .Release.Namespace }}
    {{- end }}
{{- end }}