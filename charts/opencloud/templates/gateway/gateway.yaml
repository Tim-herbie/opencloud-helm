{{- if .Values.httpRoute.gateway.create }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.httpRoute.gateway.name }}
  namespace: {{ .Values.httpRoute.gateway.namespace | default .Release.Namespace }}
  labels:
    {{- include "opencloud.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ .Values.httpRoute.gateway.className }}
  {{- with .Values.httpRoute.gateway.infrastructure }}
  infrastructure:
      {{- toYaml . | nindent 4 }}
  {{- end }}
  listeners:
    - name: opencloud-http
      protocol: HTTP
      port: {{ .Values.httpRoute.gateway.port }}
      hostname: {{ .Values.global.domain.opencloud | quote }}
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.httpRoute.gateway.namespace | default .Release.Namespace }}
    - name: keycloak-http
      protocol: HTTP
      port: {{ .Values.httpRoute.gateway.port }}
      hostname: {{ .Values.global.domain.oidc | quote }}
      allowedRoutes:
        namespaces:
          from: All
    - name: wopi-http
      protocol: HTTP
      port: {{ .Values.httpRoute.gateway.port }}
      hostname: {{ .Values.global.domain.wopi | quote }}
      allowedRoutes:
        namespaces:
          from: All
    {{- if and (eq .Values.opencloud.storage.mode "s3") .Values.opencloud.storage.s3.enabled .Values.opencloud.storage.s3.httpRoute.enabled }}
    - name: minio-http
      protocol: HTTP
      port: {{ .Values.httpRoute.gateway.port }}
      hostname: {{ .Values.global.domain.minio | quote }}
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.httpRoute.gateway.namespace | default .Release.Namespace }}
    {{- end }}
    {{- if .Values.collabora.enabled }}
    - name: collabora-http
      protocol: HTTP
      port: {{ .Values.httpRoute.gateway.port }}
      hostname: {{ .Values.global.domain.collabora | quote }}
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.httpRoute.gateway.namespace | default .Release.Namespace }}
    {{- end }}
{{- end }}
