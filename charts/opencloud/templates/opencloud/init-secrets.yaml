{{- if and .Values.opencloud.enabled (not .Values.opencloud.initSecrets.existingSecret) }}
{{- /*
  Generate stable runtime secrets for OpenCloud.
  These ENV vars override relevant values from the generated opencloud.yaml,
  ensuring all services use consistent secrets regardless of what
  opencloud init wrote during startup.

  Note: IDM service passwords (idm, reva, idp) are NOT managed here.
  They are generated by opencloud init and stored in the LDAP database.
  Config persistence is required to keep them stable across restarts.

  To provide your own secrets, set opencloud.initSecrets.existingSecret
  to the name of a pre-created Kubernetes Secret with these keys:
    jwtSecret, machineAuthApiKey, transferSecret, serviceAccountSecret
*/ -}}
{{- $secretName := printf "%s-init" (include "opencloud.opencloud.fullname" .) -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  annotations:
    "helm.sh/resource-policy": "keep"
  labels:
    {{- include "opencloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: opencloud
type: Opaque
data:
{{- if $existingSecret }}
  jwtSecret: {{ index $existingSecret.data "jwtSecret" }}
  machineAuthApiKey: {{ index $existingSecret.data "machineAuthApiKey" }}
  transferSecret: {{ index $existingSecret.data "transferSecret" }}
  serviceAccountSecret: {{ index $existingSecret.data "serviceAccountSecret" }}
{{- else }}
  jwtSecret: {{ randAlphaNum 32 | b64enc | quote }}
  machineAuthApiKey: {{ randAlphaNum 32 | b64enc | quote }}
  transferSecret: {{ randAlphaNum 32 | b64enc | quote }}
  serviceAccountSecret: {{ randAlphaNum 32 | b64enc | quote }}
{{- end }}
{{- end }}
