{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ include "opencloud.fullname" . }}-http-redirect
  labels:
    {{- include "opencloud.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.gateway.name }}
      namespace: {{ .Values.httpRoute.gateway.namespace | default .Release.Namespace }}
      {{- with .Values.httpRoute.gateway.sectionName }}
      sectionName: {{ . }}-proxy-http
      {{- end }}
  hostnames:
    - {{ include "opencloud.domain" . | quote }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: {{ include "opencloud.domain" . }}
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ include "opencloud.fullname" . }}-httproute
  labels:
    {{- include "opencloud.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.gateway.name }}
      namespace: {{ .Values.httpRoute.gateway.namespace | default .Release.Namespace }}
      {{- with .Values.httpRoute.gateway.sectionName }}
      sectionName: {{ . }}-proxy-https
      {{- end }}
  hostnames:
    - {{ include "opencloud.domain" . | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
              - "Permissions-Policy"
      backendRefs:
        - name: {{ include "opencloud.opencloud.fullname" . }}
          port: 9200
{{- end }}
