suite: Gateway Resource Tests

tests:
  - it: Gateway is created when httpRoute.gateway.create is true
    template: gateway/gateway.yaml
    set:
      httpRoute.gateway.create: true
      httpRoute.gateway.className: cilium
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Gateway

  - it: Gateway includes the collaboration listener when collaboration is enabled
    template: gateway/gateway.yaml
    set:
      httpRoute.gateway.create: true
      httpRoute.gateway.className: cilium
      collaboration.enabled: true
    asserts:
      - equal:
          path: spec.listeners[3].name
          value: collaboration-http
      - equal:
          path: spec.listeners[3].hostname
          value: wopiserver.opencloud.test

  - it: ReferenceGrant resources are created when httpRoute is enabled
    template: gateway/reference-grant.yaml
    set:
      httpRoute.enabled: true
    asserts:
      - hasDocuments:
          count: 2

  - it: Traefik Middleware is created when className is traefik and gateway.create is true
    template: gateway/traefik-middleware.yaml
    set:
      httpRoute.enabled: true
      httpRoute.gateway.create: true
      httpRoute.gateway.className: traefik
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Middleware
