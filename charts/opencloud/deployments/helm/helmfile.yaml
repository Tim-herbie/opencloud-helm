                        {
                          "name": "realm roles",
                          "protocol": "openid-connect",
                          "protocolMapper": "oidc-usermodel-realm-role-mapper",
                          "consentRequired": false,
                          "config": {
                            "introspection.token.claim": "true",
                            "multivalued": "true",
                            "userinfo.token.claim": "true",
                            "id.token.claim": "true",
                            "lightweight.claim": "false",
                            "access.token.claim": "true",
                            "claim.name": "roles",
                            "jsonType.label": "String"
                          }
                        },
                        {
                          "name": "audience resolve",
                          "protocol": "openid-connect",
                          "protocolMapper": "oidc-audience-resolve-mapper",
                          "consentRequired": false,
                          "config": {
                            "introspection.token.claim": "true",
                            "access.token.claim": "true"
                          }
                        }
                      ]
                    },
                    {
                      "name": "web-origins",
                      "description": "OpenID Connect scope for add allowed web origins to the access token",
                      "protocol": "openid-connect",
                      "attributes": {
                        "include.in.token.scope": "false",
                        "display.on.consent.screen": "false",
                        "consent.screen.text": ""
                      },
                      "protocolMappers": [
                        {
                          "name": "allowed web origins",
                          "protocol": "openid-connect",
                          "protocolMapper": "oidc-allowed-origins-mapper",
                          "consentRequired": false,
                          "config": {
                            "introspection.token.claim": "true",
                            "access.token.claim": "true"
                          }
                        }
                      ]
                    },
                    {
                      "name": "acr",
                      "description": "OpenID Connect scope for add acr (authentication context class reference) to the token",
                      "protocol": "openid-connect",
                      "attributes": {
                        "include.in.token.scope": "false",
                        "display.on.consent.screen": "false"
                      },
                      "protocolMappers": [
                        {
                          "name": "acr loa level",
                          "protocol": "openid-connect",
                          "protocolMapper": "oidc-acr-mapper",
                          "consentRequired": false,
                          "config": {
                            "id.token.claim": "true",
                            "introspection.token.claim": "true",
                            "access.token.claim": "true",
                            "userinfo.token.claim": "true"
                          }
                        }
                      ]
                    },
                    {
                      "name": "basic",
                      "description": "OpenID Connect scope for add all basic claims to the token",
                      "protocol": "openid-connect",
                      "attributes": {
                        "include.in.token.scope": "false",
                        "display.on.consent.screen": "false"
                      },
                      "protocolMappers": [
                        {
                          "name": "auth_time",
                          "protocol": "openid-connect",
                          "protocolMapper": "oidc-usersessionmodel-note-mapper",
                          "consentRequired": false,
                          "config": {
                            "user.session.note": "AUTH_TIME",
                            "introspection.token.claim": "true",
                            "userinfo.token.claim": "true",
                            "id.token.claim": "true",
                            "access.token.claim": "true",
                            "claim.name": "auth_time",
                            "jsonType.label": "long"
                          }
                        }
                      ]
                    },
                    {
                      "name": "role_list",
                      "description": "SAML role list",
                      "protocol": "saml",
                      "attributes": {
                        "consent.screen.text": "${samlRoleListScopeConsentText}",
                        "display.on.consent.screen": "true"
                      },
                      "protocolMappers": [
                        {
                          "name": "role list",
                          "protocol": "saml",
                          "protocolMapper": "saml-role-list-mapper",
                          "consentRequired": false,
                          "config": {
                            "single": "false",
                            "attribute.nameformat": "Basic",
                            "attribute.name": "Role"
                          }
                        }
                      ]
                    },
                    {
                      "name": "groups",
                      "description": "OpenID Connect scope for add user groups to the access token",
                      "protocol": "openid-connect",
                      "attributes": {
                        "include.in.token.scope": "false",
                        "display.on.consent.screen": "true",
                        "gui.order": "",
                        "consent.screen.text": ""
                      },
                      "protocolMappers": [
                        {
                          "name": "groups",
                          "protocol": "openid-connect",
                          "protocolMapper": "oidc-group-membership-mapper",
                          "consentRequired": false,
                          "config": {
                            "full.path": "false",
                            "introspection.token.claim": "true",
                            "userinfo.token.claim": "true",
                            "multivalued": "true",
                            "id.token.claim": "true",
                            "lightweight.claim": "false",
                            "access.token.claim": "true",
                            "claim.name": "groups"
                          }
                        }
                      ]
                    }
                  ],
                  "defaultDefaultClientScopes": ["role_list", "profile", "email", "roles", "web-origins", "acr", "basic", "groups"]
                }

  # ===========================================================================
  # OpenLDAP (jp-gouin/openldap-stack-ha) — External User Directory
  # ===========================================================================
  - name: openldap
    namespace: openldap
    chart: openldap/openldap-stack-ha
    version: "4.3.3"
    labels:
      ci-lint-skip: true
    values:
      - ltb-passwd:
          enabled: false
      - replication:
          enabled: false
      - replicaCount: 1
      - global:
          ldapDomain: "opencloud.eu"
          adminPassword: admin
          configPassword: config
      - customLdifFiles:
          set_logging.ldif: |-
            dn: cn=config
            changetype: modify
            replace: olcLogLevel
            olcLogLevel: stats sync
          opencloud_root.ldif: |-
            dn: dc=opencloud,dc=eu
            objectClass: organization
            objectClass: dcObject
            dc: opencloud
            o: openCloud

