# helmfile.yaml for OpenCloud Full Deployment
# Based on SOURCE helmfile.yaml (helm/charts/opencloud-microservices/deployments/helm/helmfile.yaml)
#
# Usage:
#   helmfile sync          # Deploy full stack
#   helmfile apply         # Deploy with diff preview
#   helmfile destroy       # Remove all releases

# --- Repositories ---
repositories:
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
  # - name: stable  # No longer needed — secrets created via kubectl
  #   url: https://charts.helm.sh/stable
  # - name: osixia  # COMMENTED OUT — switch to osixia later if needed
  #   url: https://charts.osixia.io
  - name: openldap
    url: https://jp-gouin.github.io/helm-openldap/
  - name: wiremind
    url: https://wiremind.github.io/wiremind-helm-charts
  - name: codecentric
    url: https://codecentric.github.io/helm-charts

# --- Releases ---
releases:

  # ===========================================================================
  # Keycloak (codecentric/keycloakx) — External OIDC Provider
  # Uses official quay.io/keycloak/keycloak image
  # ===========================================================================
  - name: keycloak
    namespace: keycloak
    chart: codecentric/keycloakx
    version: "7.2.0"
    values:
      - replicas: 1
        command:
          - "/opt/keycloak/bin/kc.sh"
          - "start-dev"
          - "--http-port=8080"
          - "--hostname-strict=false"
          - "--health-enabled=true"
          - "--import-realm"
        extraEnv: |
          - name: KC_BOOTSTRAP_ADMIN_USERNAME
            value: admin
          - name: KC_BOOTSTRAP_ADMIN_PASSWORD
            value: admin
          - name: KC_HOSTNAME
            value: https://keycloak.opencloud.test
          - name: KC_PROXY
            value: edge
          - name: JAVA_OPTS_APPEND
            value: >-
              -Djgroups.dns.query={{ include "keycloak.fullname" . }}-headless
        http:
          relativePath: "/"
        service:
          type: ClusterIP
          httpPort: 80
        startupProbe: |
          httpGet:
            path: /health/started
            port: 9000
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 60
        readinessProbe: |
          httpGet:
            path: /health/ready
            port: 9000
          periodSeconds: 10
          failureThreshold: 12
        livenessProbe: |
          httpGet:
            path: /health/live
            port: 9000
          periodSeconds: 10
          failureThreshold: 12
        extraVolumeMounts: |
          - name: realm-config
            mountPath: /opt/keycloak/data/import
            readOnly: true
        extraVolumes: |
          - name: realm-config
            configMap:
              name: keycloak-realm-config
        extraManifests:
          - |
            apiVersion: gateway.networking.k8s.io/v1beta1
            kind: HTTPRoute
            metadata:
              name: keycloak-http-redirect
              namespace: {{ .Release.Namespace }}
            spec:
              parentRefs:
                - name: cilium-gateway
                  namespace: kube-system
                  sectionName: opencloud-keycloak-http
              hostnames:
                - "keycloak.opencloud.test"
              rules:
                - filters:
                    - type: RequestRedirect
                      requestRedirect:
                        scheme: https
                        hostname: keycloak.opencloud.test
                        statusCode: 301
          - |
            apiVersion: gateway.networking.k8s.io/v1beta1
            kind: HTTPRoute
            metadata:
              name: keycloak-httproute
              namespace: {{ .Release.Namespace }}
            spec:
              parentRefs:
                - name: cilium-gateway
                  namespace: kube-system
                  sectionName: opencloud-keycloak-https
              hostnames:
                - "keycloak.opencloud.test"
              rules:
                - matches:
                    - path:
                        type: PathPrefix
                        value: /
                  backendRefs:
                    - name: keycloak-keycloakx-http
                      port: 80
          - |
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: keycloak-realm-config
              namespace: {{ .Release.Namespace }}
            data:
              openCloud-realm.json: |
                {
                  "realm": "openCloud",
                  "enabled": true,
                  "clients": [
                    {
                      "clientId": "web",
                      "name": "OpenCloud Web",
                      "enabled": true,
                      "publicClient": true,
                      "redirectUris": [
                        "https://cloud.opencloud.test/",
                        "https://cloud.opencloud.test/oidc-callback.html",
                        "https://cloud.opencloud.test/oidc-silent-redirect.html",
                        "https://cloud.opencloud2.test/",
                        "https://cloud.opencloud2.test/oidc-callback.html",
                        "https://cloud.opencloud2.test/oidc-silent-redirect.html"
                      ],
                      "webOrigins": [
                        "https://cloud.opencloud.test",
                        "https://cloud.opencloud2.test",
                        "+"
                      ],
                      "protocolMappers": [
                        {
                          "name": "groups",
                          "protocol": "openid-connect",
                          "protocolMapper": "oidc-group-membership-mapper",
                          "config": {
                            "claim.name": "groups",
                            "full.path": "false",
                            "id.token.claim": "true",
                            "access.token.claim": "true"
                          }
                        }
                      ]
                    },
                    {
                      "clientId": "OpenCloudDesktop",
                      "name": "OpenCloud Desktop",
                      "enabled": true,
                      "publicClient": true,
                      "redirectUris": ["http://127.0.0.1:*", "http://localhost:*"]
                    },
                    {
                      "clientId": "OpenCloudAndroid",
                      "name": "OpenCloud Android",
                      "enabled": true,
                      "publicClient": true,
                      "redirectUris": ["oc://android.opencloud.eu"]
                    },
                    {
                      "clientId": "OpenCloudIOS",
                      "name": "OpenCloud iOS",
                      "enabled": true,
                      "publicClient": true,
                      "redirectUris": ["oc://ios.opencloud.eu"]
                    }
                  ],
                  "roles": {
                    "realm": [
                      { "name": "opencloudAdmin", "description": "OpenCloud Admin" },
                      { "name": "opencloudSpaceAdmin", "description": "OpenCloud Space Admin" },
                      { "name": "opencloudUser", "description": "OpenCloud User" },
                      { "name": "opencloudGuest", "description": "OpenCloud Guest" }
                    ]
                  },
                  "users": [
                    {
                      "username": "admin",
                      "enabled": true,
                      "firstName": "Admin",
                      "lastName": "Admin",
                      "email": "admin@opencloud.test",
                      "realmRoles": ["opencloudAdmin", "default-roles-opencloud"],
                      "credentials": [{ "type": "password", "value": "admin", "temporary": false }]
                    },
                    {
                      "username": "alan",
                      "enabled": true,
                      "firstName": "Alan",
                      "lastName": "Turing",
                      "email": "alan@opencloud.test",
                      "realmRoles": ["opencloudUser", "default-roles-opencloud"],
                      "credentials": [{ "type": "password", "value": "demo", "temporary": false }]
                    },
                    {
                      "username": "mary",
                      "enabled": true,
                      "firstName": "Mary",
                      "lastName": "Kenneth Keller",
                      "email": "mary@opencloud.test",
                      "realmRoles": ["opencloudUser", "default-roles-opencloud"],
                      "credentials": [{ "type": "password", "value": "demo", "temporary": false }]
                    },
                    {
                      "username": "margaret",
                      "enabled": true,
                      "firstName": "Margaret",
                      "lastName": "Hamilton",
                      "email": "margaret@opencloud.test",
                      "realmRoles": ["opencloudUser", "default-roles-opencloud"],
                      "credentials": [{ "type": "password", "value": "demo", "temporary": false }]
                    },
                    {
                      "username": "dennis",
                      "enabled": true,
                      "firstName": "Dennis",
                      "lastName": "Ritchie",
                      "email": "dennis@opencloud.test",
                      "realmRoles": ["opencloudUser", "default-roles-opencloud"],
                      "credentials": [{ "type": "password", "value": "demo", "temporary": false }]
                    },
                    {
                      "username": "lynn",
                      "enabled": true,
                      "firstName": "Lynn",
                      "lastName": "Conway",
                      "email": "lynn@opencloud.test",
                      "realmRoles": ["opencloudUser", "default-roles-opencloud"],
                      "credentials": [{ "type": "password", "value": "demo", "temporary": false }]
