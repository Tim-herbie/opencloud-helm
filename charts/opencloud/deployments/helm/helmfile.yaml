# helmfile.yaml for OpenCloud Full Deployment (TARGET: opencloud-helm monolithic)
# Based on SOURCE helmfile.yaml (helm/charts/opencloud-microservices/deployments/helm/helmfile.yaml)
# Adapted for TARGET monolithic chart with separate Keycloak, OpenLDAP, and ClamAV charts.
#
# Usage:
#   helmfile sync          # Deploy full stack
#   helmfile apply         # Deploy with diff preview
#   helmfile destroy       # Remove all releases

# --- Repositories ---
repositories:
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
  - name: osixia
    url: https://charts.osixia.io
  - name: wiremind
    url: https://wiremind.github.io/wiremind-helm-charts

# --- Releases ---
releases:

  # ===========================================================================
  # Shared Secrets (OIDC + LDAP + S3 credentials)
  # ===========================================================================
  - name: opencloud-secrets
    namespace: opencloud
    chart: stable/raw
    version: "0.1.0"
    installed: true
    values:
      - resources:
          # OIDC client credentials (shared between Keycloak realm and OpenCloud)
          - apiVersion: v1
            kind: Secret
            metadata:
              name: opencloud-oidc-credentials
              namespace: opencloud
            type: Opaque
            stringData:
              client-id: "web"
              client-secret: "opencloud-secret-key"
          # LDAP bind password for OpenCloud to connect to OpenLDAP
          - apiVersion: v1
            kind: Secret
            metadata:
              name: ldap-bind-secrets
              namespace: opencloud
            type: Opaque
            stringData:
              reva-ldap-bind-password: admin
          # S3 credentials for decomposeds3 storage backend
          - apiVersion: v1
            kind: Secret
            metadata:
              name: s3secret
              namespace: opencloud
            type: Opaque
            stringData:
              accessKey: opencloud
              secretKey: opencloud-secret-key

  # ===========================================================================
  # Keycloak (bitnami/keycloak v24.3.0) — External OIDC Provider
  # ===========================================================================
  - name: keycloak
    namespace: opencloud
    chart: bitnami/keycloak
    version: "24.3.0"
    needs:
      - opencloud/opencloud-secrets
    values:
      - auth:
          adminUser: admin
          adminPassword: admin
        postgresql:
          enabled: true
          auth:
            postgresPassword: keycloak
            username: keycloak
            password: keycloak
            database: keycloak
        extraEnvVars:
          - name: KC_HOSTNAME
            value: keycloak.opencloud.test
          - name: KC_PROXY
            value: edge
          - name: KEYCLOAK_EXTRA_ARGS
            value: "-Dkeycloak.import=/opt/bitnami/keycloak/data/import/opencloud-realm.json"
        extraVolumes:
          - name: realm-config
            configMap:
              name: keycloak-realm-config
        extraVolumeMounts:
          - name: realm-config
            mountPath: /opt/bitnami/keycloak/data/import
        ingress:
          enabled: true
          hostname: keycloak.opencloud.test
        extraDeploy:
          - apiVersion: v1
            kind: ConfigMap
            metadata:
              name: keycloak-realm-config
              namespace: opencloud
            data:
              opencloud-realm.json: |
                {
                  "realm": "openCloud",
                  "enabled": true,
                  "clients": [
                    {
                      "clientId": "web",
                      "name": "OpenCloud Web",
                      "enabled": true,
                      "publicClient": true,
                      "redirectUris": [
                        "http://cloud.opencloud.test/*",
                        "https://cloud.opencloud.test/*"
                      ],
                      "webOrigins": [
                        "http://cloud.opencloud.test",
                        "https://cloud.opencloud.test",
                        "+"
                      ],
                      "protocolMappers": [
                        {
                          "name": "groups",
                          "protocol": "openid-connect",
                          "protocolMapper": "oidc-group-membership-mapper",
                          "config": {
                            "claim.name": "groups",
                            "full.path": "false",
                            "id.token.claim": "true",
                            "access.token.claim": "true"
                          }
                        }
                      ]
                    },
                    {
                      "clientId": "OpenCloudDesktop",
                      "name": "OpenCloud Desktop",
                      "enabled": true,
                      "publicClient": true,
                      "redirectUris": ["http://127.0.0.1:*", "http://localhost:*"]
                    },
                    {
                      "clientId": "OpenCloudAndroid",
                      "name": "OpenCloud Android",
                      "enabled": true,
                      "publicClient": true,
                      "redirectUris": ["oc://android.opencloud.eu"]
                    },
                    {
                      "clientId": "OpenCloudIOS",
                      "name": "OpenCloud iOS",
                      "enabled": true,
                      "publicClient": true,
                      "redirectUris": ["oc://ios.opencloud.eu"]
                    }
                  ],
                  "roles": {
                    "realm": [
                      { "name": "opencloudAdmin", "description": "OpenCloud Admin" },
                      { "name": "opencloudSpaceAdmin", "description": "OpenCloud Space Admin" },
                      { "name": "opencloudUser", "description": "OpenCloud User" },
                      { "name": "opencloudGuest", "description": "OpenCloud Guest" }
                    ]
                  },
                  "users": [
                    {
                      "username": "admin",
                      "enabled": true,
                      "firstName": "Admin",
                      "lastName": "Admin",
                      "email": "admin@opencloud.test",
                      "realmRoles": ["opencloudAdmin", "default-roles-opencloud"],
                      "credentials": [{ "type": "password", "value": "admin", "temporary": false }]
                    },
                    {
                      "username": "alan",
                      "enabled": true,
                      "firstName": "Alan",
                      "lastName": "Turing",
                      "email": "alan@opencloud.test",
                      "realmRoles": ["opencloudUser", "default-roles-opencloud"],
                      "credentials": [{ "type": "password", "value": "demo", "temporary": false }]
                    },
                    {
                      "username": "mary",
                      "enabled": true,
                      "firstName": "Mary",
                      "lastName": "Kenneth Keller",
                      "email": "mary@opencloud.test",
                      "realmRoles": ["opencloudUser", "default-roles-opencloud"],
                      "credentials": [{ "type": "password", "value": "demo", "temporary": false }]
                    },
                    {
                      "username": "margaret",
                      "enabled": true,
                      "firstName": "Margaret",
                      "lastName": "Hamilton",
                      "email": "margaret@opencloud.test",
                      "realmRoles": ["opencloudUser", "default-roles-opencloud"],
                      "credentials": [{ "type": "password", "value": "demo", "temporary": false }]
                    },
                    {
                      "username": "dennis",
                      "enabled": true,
                      "firstName": "Dennis",
                      "lastName": "Ritchie",
                      "email": "dennis@opencloud.test",
                      "realmRoles": ["opencloudUser", "default-roles-opencloud"],
                      "credentials": [{ "type": "password", "value": "demo", "temporary": false }]
                    },
                    {
                      "username": "lynn",
                      "enabled": true,
                      "firstName": "Lynn",
                      "lastName": "Conway",
                      "email": "lynn@opencloud.test",
                      "realmRoles": ["opencloudUser", "default-roles-opencloud"],
