      - customSchemaFiles:
          10_opencloud_schema.ldif: |-
            # This LDIF files describes the OpenCloud schema
            dn: cn=opencloud,cn=schema,cn=config
            objectClass: olcSchemaConfig
            cn: opencloud
            olcObjectIdentifier: openCloudOid 1.3.6.1.4.1.63016
            #   openCloudOid:1.1 for AttributeTypes and openCloudOid:1.2 for ObjectClasses
            olcAttributeTypes: ( openCloudOid:1.1.1 NAME 'openCloudUUID'
              DESC 'A non-reassignable and persistent account ID)'
              EQUALITY uuidMatch
              SUBSTR caseIgnoreSubstringsMatch
              SYNTAX 1.3.6.1.1.16.1 SINGLE-VALUE )
            olcAttributeTypes: ( openCloudOid:1.1.2 NAME 'openCloudExternalIdentity'
              DESC 'A triple separated by "$" representing the objectIdentity resource type of the Graph API ( signInType $ issuer $ issuerAssignedId )'
              EQUALITY caseIgnoreMatch
              SUBSTR caseIgnoreSubstringsMatch
              SYNTAX 1.3.6.1.4.1.1466.115.121.1.15 )
            olcAttributeTypes: ( openCloudOid:1.1.3 NAME 'openCloudUserEnabled'
              DESC 'A boolean value indicating if the user is enabled'
              EQUALITY booleanMatch
              SYNTAX 1.3.6.1.4.1.1466.115.121.1.7 SINGLE-VALUE)
            olcAttributeTypes: ( openCloudOid:1.1.4 NAME 'openCloudUserType'
              DESC 'User type (e.g. Member or Guest)'
              EQUALITY caseIgnoreMatch
              SYNTAX 1.3.6.1.4.1.1466.115.121.1.15 SINGLE-VALUE )
            olcAttributeTypes: ( openCloudOid:1.1.5 NAME 'openCloudLastSignInTimestamp'
              DESC 'The timestamp of the last sign-in'
              EQUALITY generalizedTimeMatch
              ORDERING generalizedTimeOrderingMatch
              SYNTAX  1.3.6.1.4.1.1466.115.121.1.24 SINGLE-VALUE )
            olcObjectClasses: ( openCloudOid:1.2.1 NAME 'openCloudObject'
              DESC 'OpenCloud base objectclass'
              AUXILIARY
              MAY ( openCloudUUID ) )
            olcObjectClasses: ( openCloudOid:1.2.2 NAME 'openCloudUser'
              DESC 'OpenCloud User objectclass'
              SUP openCloudObject
              AUXILIARY
              MAY ( openCloudExternalIdentity $ openCloudUserEnabled $ openCloudUserType $ openCloudLastSignInTimestamp) )

  # ===========================================================================
  # ClamAV (wiremind/clamav) — Antivirus Scanner
  # ===========================================================================
  - name: clamav
    namespace: clamav
    chart: wiremind/clamav
    version: "3.7.1"
    installed: true
    values:
      - replicaCount: 2
        resources:
          limits:
            cpu: "6"
            memory: 8Gi
          requests:
            cpu: "1"
            memory: 2Gi

  # ===========================================================================
  # OpenCloud
  # Full configuration based on SOURCE helmfile.yaml
  # ===========================================================================
  - name: opencloud
    namespace: opencloud
    chart: ../../
    values:
      # --- General Settings ---
      - global:
          domain:
            opencloud: cloud.opencloud.test
            oidc: keycloak.opencloud.test
            minio: minio.opencloud.test
            wopi: wopiserver.opencloud.test
            collabora: collabora.opencloud.test
            companion: companion.opencloud.test
          tls:
            enabled: true
        opencloud:
          logLevel: info
        collabora:
          enabled: true

      # --- OIDC / External User Management ---
      - oidc:
          issuerUrl: https://keycloak.opencloud.test/realms/openCloud
          clientId: "web"
        features:
          externalUserManagement:
            enabled: true
            adminUUID: "0ab77e6d-23b4-4ba3-9843-a3b3efdcfc53"
            autoprovisionAccounts:
              enabled: true
              claimUserName: sub
            oidc:
              domain: localhost
              issuerURI: https://keycloak.opencloud.test/realms/openCloud
              userIDClaim: sub
              userIDClaimAttributeMapping: username
              roleAssignment:
                claim: roles
            ldap:
              writeable: true
              uri: ldaps://openldap.openldap.svc.cluster.local:636
              insecure: true
              bindDN: cn=admin,dc=opencloud,dc=eu
              user:
                userNameMatch: none
                schema:
                  id: openCloudUUID
              group:
                schema:
                  id: openCloudUUID

      # --- Insecure settings ---
      - insecure:
          oidcIdpInsecure: true
          ocHttpApiInsecure: true

      # --- Storage mode (posixfs — no MinIO) ---
      - opencloud:
          storage:
            mode: posixfs
            s3:
              enabled: false
            posixfs:
              persistence:
                accessMode: ReadWriteMany

      # --- Secret refs ---
      - secretRefs:
          ldapSecretRef: ldap-bind-secrets
          s3CredentialsSecretRef: s3secret

      # --- Networking ---
      - ingress:
          enabled: false
          ingressClassName: nginx
          annotations:
            nginx.ingress.kubernetes.io/proxy-body-size: 1024m
        httpRoute:
          enabled: true
          gateway:
            create: false
            name: cilium-gateway
            namespace: kube-system
            port: 80
            sectionName: opencloud

      # --- Quotas ---
      - quotas:
          roles:
            'd7beeea8-8ff4-406b-8fb6-ab2dd81e6b11': 0
            '2aadd357-682c-406b-8874-293091995fdd': 0

      # --- Antivirus ---
      - features:
          virusscan:
            enabled: true
            infectedFileHandling: "abort"
            scannerType: "clamav"
            clamavSocket: "tcp://clamav.clamav.svc.cluster.local:3310"

      # --- Email/SMTP ---
          emailNotifications:
            enabled: false
            smtp:
              host: ""
              port: ""
              sender: ""
              authentication: none
              encryption: ssltls

      # --- OPA Policies ---
          policies:
            enabled: true
            policies:
              - fileName: proxy.rego
                content: |
                  package proxy
                  import future.keywords.if
                  import data.utils
                  default granted := true
                  granted = false if {
                      input.request.method == "PUT"
                      pathPrefixes := ["/dav", "/remote.php/webdav", "/remote.php/dav", "/webdav"]
                      restricted := pathPrefixes[_]
                      startswith(input.request.path, restricted)
                      utils.is_extension_restricted(input.resource.name)
                  }
              - fileName: postprocessing.rego
                content: |
                  package postprocessing
                  import future.keywords.if
                  import data.utils
                  default granted := true
                  granted = false if {
                      utils.is_extension_restricted(input.resource.name)
                  }
                  granted = false if {
                      bytes := opencloud.resource.download(input.resource.url)
                      mimetype := opencloud.mimetype.detect(bytes)
                      utils.is_mimetype_restricted(mimetype)
                  }
              - fileName: utils.rego
                content: |
                  package utils
                  RESTRICTED_EXTENSIONS := {".exe", ".dll", ".msi", ".scr", ".com", ".pif", ".bat", ".cmd", ".ps1", ".vbs", ".vbe", ".wsh"}
                  RESTRICTED_EXTENSIONS_NO_DOT := {"exe", "dll", "msi", "scr", "com", "pif", "bat", "cmd", "ps1", "vbs", "vbe", "wsh"}
                  RESTRICTED_MIMETYPES := {"application/x-msdownload", "application/x-dosexec", "application/x-executable", "application/vnd.microsoft.portable-executable", "application/x-msi", "application/x-ms-dos-executable", "application/x-msdos-program", "application/x-bat", "application/bat", "application/x-sh", "application/x-shellscript"}
                  is_extension_restricted(identifier) {
                      extension := RESTRICTED_EXTENSIONS[_]
                      endswith(lower(identifier), extension)
                  }
                  is_mimetype_restricted(mimetype) {
                      RESTRICTED_MIMETYPES[mimetype]
                  }
                  is_mimetype_restricted(mimetype) {
                      extensions := opencloud.mimetype.extensions(mimetype)
                      ext := extensions[_]
                      RESTRICTED_EXTENSIONS_NO_DOT[ext]
                  }

      # --- Apps Integration / WOPI ---
          appsIntegration:
            enabled: true
            wopiIntegration:
              officeSuites:
                - name: Collabora
                  product: Collabora
                  enabled: false
                  uri: "https://collabora.opencloud.test"
                  insecure: true
                  disableProof: false
                  iconURI: https://collabora.opencloud.test/favicon.ico
                - name: OnlyOffice
                  product: OnlyOffice
                  enabled: false
                  uri: "https://onlyoffice.opencloud.test"
                  insecure: true
                  disableProof: false

      # --- Replicas ---
      - replicas: 1
        opencloud:
          migration:
            enabled: false

