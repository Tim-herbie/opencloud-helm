apiVersion: v1
kind: Namespace
metadata:
  name: clamav
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: wiremind
  namespace: clamav
spec:
  interval: 15m
  url: https://wiremind.github.io/wiremind-helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: clamav
  namespace: clamav
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: clamav
      version: "3.7.1"
      sourceRef:
        kind: HelmRepository
        name: wiremind
        namespace: clamav
      interval: 5m
  releaseName: clamav
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  test:
    enable: true
  driftDetection:
    mode: enabled
    ignore:
      - paths: ["/spec/replicas"]
        target:
          kind: Deployment
  values:
    replicaCount: 2
    resources:
      limits:
        cpu: "6"
        memory: 8Gi
      requests:
        cpu: "1"
        memory: 2Gi