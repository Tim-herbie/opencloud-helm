# Service account for Flux in openldap namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flux
  namespace: openldap
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flux-full-access
  namespace: openldap
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flux-full-access-binding
  namespace: openldap
subjects:
  - kind: ServiceAccount
    name: flux
    namespace: openldap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flux-full-access
