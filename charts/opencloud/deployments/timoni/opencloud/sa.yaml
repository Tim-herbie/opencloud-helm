# Service account for Flux in opencloud namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flux
  namespace: opencloud
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flux-full-access
  namespace: opencloud
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flux-full-access-binding
  namespace: opencloud
subjects:
  - kind: ServiceAccount
    name: flux
    namespace: opencloud
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flux-full-access
