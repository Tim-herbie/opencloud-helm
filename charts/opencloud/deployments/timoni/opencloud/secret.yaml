# LDAP bind password (must match OpenLDAP admin password)
apiVersion: v1
kind: Secret
metadata:
  name: ldap-bind-secrets
  namespace: opencloud
stringData:
  reva-ldap-bind-password: admin
---
# S3 credentials for decomposeds3 storage backend
apiVersion: v1
kind: Secret
metadata:
  name: s3secret
  namespace: opencloud
stringData:
  accessKey: opencloud
  secretKey: opencloud-secret-key
---
# OIDC client credentials (shared with external Keycloak)
apiVersion: v1
kind: Secret
metadata:
  name: opencloud-oidc-credentials
  namespace: opencloud
stringData:
  client-id: "web"
  client-secret: "opencloud-secret-key"
