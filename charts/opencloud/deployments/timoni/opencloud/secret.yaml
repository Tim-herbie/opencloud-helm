# LDAP bind password (must match OpenLDAP admin password)
apiVersion: v1
kind: Secret
metadata:
  name: ldap-bind-secrets
  namespace: opencloud
stringData:
  reva-ldap-bind-password: admin
---
# S3 credentials (referenced by chart even when using posixfs)
apiVersion: v1
kind: Secret
metadata:
  name: s3secret
  namespace: opencloud
stringData:
  accessKey: opencloud
  secretKey: opencloud-secret-key
