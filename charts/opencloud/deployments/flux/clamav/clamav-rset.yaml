apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: clamav
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcile: "enabled"
    fluxcd.controlplane.io/reconcileEvery: "30m"
    fluxcd.controlplane.io/reconcileTimeout: "5m"
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/part-of: opencloud
      app.kubernetes.io/component: clamav
  # ---------------------------------------------------------------------------
  # Shared ClamAV. Skip this file to use an EXTERNAL ClamAV — point each
  # OpenCloud instance's features.virusscan.clamavSocket at your external
  # ClamAV instead. No other ResourceSet depends on this object existing.
  # ---------------------------------------------------------------------------
  inputs:
    - namespace: clamav
      version: "3.7.1"
  resources:
    - apiVersion: v1
      kind: Namespace
      metadata:
        name: << inputs.namespace >>
    - apiVersion: source.toolkit.fluxcd.io/v1beta2
      kind: HelmRepository
      metadata:
        name: wiremind
        namespace: << inputs.namespace >>
      spec:
        interval: 1h
        url: https://wiremind.github.io/wiremind-helm-charts
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: clamav
        namespace: << inputs.namespace >>
      spec:
        interval: 15m
        releaseName: clamav
        chart:
          spec:
            chart: clamav
            version: << inputs.version | quote >>
            sourceRef:
              kind: HelmRepository
              name: wiremind
              namespace: << inputs.namespace >>
        values:
          replicaCount: 2
          resources:
            limits:
              cpu: "6"
              memory: 8Gi
            requests:
              cpu: "1"
              memory: 2Gi
        install:
          remediation:
            retries: 3
        upgrade:
          remediation:
            retries: 3