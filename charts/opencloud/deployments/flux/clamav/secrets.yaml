# ClamAV Secrets — placeholder values only, safe for a throwaway test cluster.
# The wiremind/clamav chart does not require any secrets by default; this
# file is intentionally empty so `kubectl apply -R -f flux/` works. Add keys
# here if your clamav chart configuration needs them (e.g. a registry pull
# secret) and reference them from the HelmRelease values above.
apiVersion: v1
kind: Secret
metadata:
  name: clamav-secrets
  namespace: clamav
  labels:
    app.kubernetes.io/part-of: opencloud
    app.kubernetes.io/component: clamav
type: Opaque
stringData: {}