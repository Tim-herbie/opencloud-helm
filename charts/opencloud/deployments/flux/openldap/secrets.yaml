# OpenLDAP Secrets — placeholder values only, safe for a throwaway test cluster.
# !! CHANGE ME for anything real. The whole `values.yaml` block is merged into
# the jp-gouin/openldap-stack-ha Helm values via valuesFrom on the HelmRelease.
