# Keycloak Secrets — placeholder values only, safe for a throwaway test cluster.
# !! CHANGE ME for anything real. These keys are merged into the
# codecentric/keycloakx Helm values via valuesFrom on the HelmRelease.
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secrets
  namespace: opencloud
  labels:
    app.kubernetes.io/part-of: opencloud
    app.kubernetes.io/component: keycloak
type: Opaque
stringData:
  KC_BOOTSTRAP_ADMIN_USERNAME: admin
  KC_BOOTSTRAP_ADMIN_PASSWORD: admin