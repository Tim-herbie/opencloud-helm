name: Publish Helm charts to OCI Registry

on:
  push:
    tags:
      - '*.*.*'
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: 'latest'

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          install_only: true
          
      - name: Set up tags
        run: |
          echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
          echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
            echo "CHARTS_VERSION=${RELEASE_TAG#v}" >> $GITHUB_ENV
          else
            echo "CHARTS_VERSION=0.0.0-dev" >> $GITHUB_ENV
          fi

      - name: Package and push OpenCloud chart
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "Updating chart version to ${{ env.CHARTS_VERSION }}"
            sed -i "s/^version:.*/version: ${{ env.CHARTS_VERSION }}/" charts/opencloud/Chart.yaml
          fi
          
          # Package Helm chart
          helm package charts/opencloud
          
          # Push to GHCR
          helm push opencloud-*.tgz oci://ghcr.io/tim-herbie/opencloud-helm
          
          # Verify the pushed chart
          echo "Verifying the pushed chart..."
          helm pull oci://ghcr.io/tim-herbie/opencloud-helm/opencloud --version $(helm show chart charts/opencloud | grep version | awk '{print $2}')