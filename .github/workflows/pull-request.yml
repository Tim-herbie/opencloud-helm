name: Helm Chart Lint and Test

on:
  pull_request:
  workflow_dispatch:

jobs:
  helm-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: 'latest'

      - name: Lint Helm chart
        run: |
          echo "Linting charts/opencloud..."
          helm lint charts/opencloud

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.5.1 --verify=false

      - name: Run Helm unit tests
        run: helm unittest charts/opencloud

      # Create ephemeral Kubernetes cluster
      - name: Create Kind cluster
        uses: helm/kind-action@v1

      # Install Helm chart in test namespace
      - name: Install Helm chart
        run: |
          helm install opencloud-test charts/opencloud \
            --namespace opencloud-test \
            --create-namespace \
            --wait \
            --timeout 5m

      # Verify pods become ready
      - name: Wait for pods to be ready
        run: |
          kubectl wait --for=condition=Ready pod \
            --all \
            --namespace opencloud-test \
            --timeout=180s

      # Debug if validation job fails
      - name: Debug pods if failed
        if: failure()
        run: |
          echo "==== Pods ===="
          kubectl get pods -A
          echo "==== Describe Pods ===="
          kubectl describe pods -A
          echo "==== Events ===="
          kubectl get events -A

  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: 'latest'

      # Create ephemeral Kubernetes cluster
      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          config: .github/kind/kind-config.yaml

      - name: Install Gateway API CRDs
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/latest/download/standard-install.yaml

      - name: Install Traefik
        run: |
          helm repo add traefik https://traefik.github.io/charts
          helm repo update

          helm install traefik traefik/traefik \
            --namespace traefik \
            --create-namespace \
            -f .github/kind/traefik-values.yaml \
            --wait

      - name: Create opencloud-test namespace and create tls secret
        run: |
          kubectl create namespace opencloud-test || true

          openssl req -x509 -nodes -days 365 \
            -newkey rsa:2048 \
            -keyout tls.key \
            -out tls.crt \
            -subj "/CN=opencloud.127.0.0.1.nip.io"

          kubectl create secret tls opencloud-tls-secret \
            --namespace opencloud-test \
            --cert=tls.crt \
            --key=tls.key

      # Install Helm chart in test namespace
      - name: Install Helm chart
        run: |
          helm install opencloud-test charts/opencloud \
            -f .github/kind/opencloud-minimal-values.yaml \
            --namespace opencloud-test \
            --wait \
            --timeout 5m

      - name: Debug Traefik Helm Values
        run: |
          helm get values traefik -n traefik

      - name: Debug Traefik Service
        run: |
          kubectl get nodes

          echo "------------"

          kubectl get svc -o wide -A

          echo "------------"

          kubectl get gatewayclass

          echo "------------"

          kubectl get gateway -A

          echo "------------"

          kubectl -n opencloud-test get gateway opencloud-gateway -o yaml

          echo "------------"

          kubectl get httproute -A

          echo "------------"

          kubectl -n opencloud-test get httproute opencloud-test-httproute -o yaml

          echo "------------"

          docker ps

          echo "------------"

          curl -v http://localhost

          echo "------------"

          curl -vk https://opencloud.127.0.0.1.nip.io

      # Verify pods become ready
      - name: Wait for pods to be ready
        run: |
          kubectl wait --for=condition=Ready pod \
            --all \
            --namespace opencloud-test \
            --timeout=180s

      # Debug if helm install fails
      - name: Debug pods if failed
        if: failure()
        run: |
          echo "==== Pods ===="
          kubectl get pods -A
          echo "==== Describe Pods ===="
          kubectl describe pods -A
          echo "==== Events ===="
          kubectl get events -A

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install e2e dependencies
        working-directory: charts/opencloud/tests/e2e
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: charts/opencloud/tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: |      
          cd charts/opencloud/tests/e2e
          OPENCLOUD_BASE_URL="https://opencloud.127.0.0.1.nip.io" \
          OPENCLOUD_USERNAME=admin \
          OPENCLOUD_PASSWORD=admin \
          OPENCLOUD_IGNORE_HTTPS_ERRORS='true' \
          npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: charts/opencloud/tests/e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 7