on:
  push:
    branches:
      - main
      - feature/*
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

name: release-bot

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.PAT }}
          release-type: helm
          path: charts/opencloud